<title>تماس با ما</title>
<section class="section reveal">
  <div class="container">
    <div class="section__header">
      <h2 class="section__title">تماس با ما</h2>
      <div class="section__divider"></div>
      <span class="section__subtitle">نظرات، پیشنهادات و سوالات خود را با ما در میان بگذارید</span>
    </div>
    <div class="contact-wrapper">
      <form class="contact-form">
        <div>
          <label class="contact-field">نام و نام خانوادگی</label>
          <input type="text" class="contact-input" placeholder="نام خود را وارد کنید">
        </div>
        <div>
          <label class="contact-field">ایمیل</label>
          <input type="email" class="contact-input" placeholder="ایمیل خود را وارد کنید">
        </div>
        <div>
          <label class="contact-field">پیام</label>
          <textarea rows="5" class="contact-textarea" placeholder="پیام خود را بنویسید"></textarea>
        </div>
        <button type="submit" class="contact-submit">ارسال پیام</button>
      </form>
    </div>
  </div>
</section>
