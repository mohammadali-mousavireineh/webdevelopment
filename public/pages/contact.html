<section class="section reveal">
  <div class="container">
    <div class="section__header">
      <h2 class="section__title">تماس با ما</h2>
      <div class="section__divider"></div>
      <span class="section__subtitle">نظرات، پیشنهادات و سوالات خود را با ما در میان بگذارید</span>
    </div>
    <div style="max-width:600px;margin:0 auto;">
      <form class="contact-form" style="display:grid;gap:1.5rem;">
        <div>
          <label style="display:block;margin-bottom:0.5rem;font-weight:600;color:var(--color-text);">نام و نام خانوادگی</label>
          <input type="text" style="width:100%;padding:0.75rem 1rem;border:2px solid var(--color-border);border-radius:var(--radius-md);font-size:1rem;background:var(--color-surface);color:var(--color-text);" placeholder="نام خود را وارد کنید">
        </div>
        <div>
          <label style="display:block;margin-bottom:0.5rem;font-weight:600;color:var(--color-text);">ایمیل</label>
          <input type="email" style="width:100%;padding:0.75rem 1rem;border:2px solid var(--color-border);border-radius:var(--radius-md);font-size:1rem;background:var(--color-surface);color:var(--color-text);" placeholder="ایمیل خود را وارد کنید">
        </div>
        <div>
          <label style="display:block;margin-bottom:0.5rem;font-weight:600;color:var(--color-text);">پیام</label>
          <textarea rows="5" style="width:100%;padding:0.75rem 1rem;border:2px solid var(--color-border);border-radius:var(--radius-md);font-size:1rem;background:var(--color-surface);color:var(--color-text);resize:vertical;" placeholder="پیام خود را بنویسید"></textarea>
        </div>
        <button type="submit" style="padding:0.75rem 2rem;font-size:1rem;font-weight:700;background:var(--color-primary);color:var(--color-text-on-primary);border:none;border-radius:var(--radius-md);cursor:pointer;transition:background var(--transition-normal);">ارسال پیام</button>
      </form>
    </div>
  </div>
</section>
